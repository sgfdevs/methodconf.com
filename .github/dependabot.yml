version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        applies-to: "version-updates"
        patterns:
          - "*"
      github-actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directories:
      - "/backend/src/MethodConf.Cms"
      - "/backend/tests/MethodConf.Cms.Tests"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      dotnet:
        applies-to: "version-updates"
        group-by: "dependency-name"
        patterns:
          - "*"
      dotnet-security:
        applies-to: "security-updates"
        group-by: "dependency-name"
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      npm:
        applies-to: "version-updates"
        patterns:
          - "*"
      npm-security:
        applies-to: "security-updates"
        patterns:
          - "*"
